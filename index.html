function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_DATA);
    const parsed = JSON.parse(raw);
    return {
      ...structuredClone(DEFAULT_DATA),
      ...parsed,
      vehicle: {
        ...DEFAULT_DATA.vehicle,
        ...(parsed.vehicle || {})
      },
      settings: {
        ...DEFAULT_DATA.settings,
        ...(parsed.settings || {})
      }
    };
  } catch (e) {
    return structuredClone(DEFAULT_DATA);
  }
}
function saveData(d) {
  try {

function buildICS(events) {

    const start = dt(ev.date);
    const d = parseDate(ev.date);
    d.setDate(d.getDate() + 1);
    const end = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
    lines.push('BEGIN:VEVENT');
    lines.push('UID:xmax-' + ev.key + '-' + start + '-' + i + '@xmax.logbook');
    lines.push('DTSTART;VALUE=DATE:' + start);
    lines.push('DTEND;VALUE=DATE:' + end);
    lines.push('SUMMARY:' + esc('🛵 ' + ev.title));
    if (ev.desc) lines.push('DESCRIPTION:' + esc(ev.desc));
    lines.push('BEGIN:VALARM', 'TRIGGER:-P' + (ev.alarmDays || 7) + 'D', 'ACTION:DISPLAY', 'DESCRIPTION:' + esc(ev.title), 'END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

// บีบอัดรูปเป็น JPEG base64 ขนาดเล็ก (ประหยัดพื้นที่ localStorage)
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width,
          h = img.height;
        const scale = Math.min(1, maxDim / Math.max(w, h));
        w = Math.round(w * scale);
        h = Math.round(h * scale);
        const cv = document.createElement('canvas');
        cv.width = w;
        cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
