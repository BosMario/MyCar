  <script>
    // Visible error overlay for debugging on device (no devtools)
    window.__xmaxErr = function (msg) {
      var el = document.getElementById('errbox');
      if (!el) {
        el = document.createElement('div');
        el.id = 'errbox';
        el.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#1a0a0a;color:#fca5a5;font:13px/1.5 -apple-system,monospace;padding:24px;overflow:auto;white-space:pre-wrap;';
        document.body.appendChild(el);
        el.textContent = '⚠️ เกิดข้อผิดพลาด (ส่งข้อความนี้ให้ผู้พัฒนา):\n\n';
      }
      el.textContent += msg + '\n\n';
    };
    window.addEventListener('error', function (e) {
      window.__xmaxErr((e.message || 'error') + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      window.__xmaxErr('Promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  </script>

    /* ============================== BUSINESS LOGIC ============================== */
    // fuel efficiency between consecutive full-tank fills
    function computeFuelStats(fuelLogs) {
      const sorted = [...fuelLogs].sort((a, b) => (a.odo - b.odo) || (a.date < b.date ? -1 : 1));
      const result = sorted.map(f => ({ ...f, kmpl: null, dist: null }));
      let lastFullIdx = -1, accLiters = 0;
      for (let i = 0; i < sorted.length; i++) {
        const f = sorted[i];
        if (lastFullIdx >= 0) accLiters += Number(f.liters || 0);
        if (f.isFull) {
          if (lastFullIdx >= 0) {
            const dist = f.odo - sorted[lastFullIdx].odo;
            if (dist > 0 && accLiters > 0) { result[i].kmpl = dist / accLiters; result[i].dist = dist; }
          }
          lastFullIdx = i; accLiters = 0;
        }
      }
      return result;
    }
    function avgKmpl(fuelStats) {
      const v = fuelStats.filter(f => f.kmpl != null);
      if (!v.length) return null;
      return v.reduce((s, f) => s + f.kmpl, 0) / v.length;
    }

    function activeSchedule(settings) {

    // อัตราใช้รถเฉลี่ย (กม./วัน) จากจุดข้อมูลที่มีทั้งวันที่และเลขไมล์
    function computeUsage(data) {
      const pts = [];
      data.fuelLogs.forEach(f => { if (f.date && f.odo > 0) pts.push({ date: f.date, odo: +f.odo }); });
      data.maintenanceLogs.forEach(m => { if (m.date && m.odo > 0) pts.push({ date: m.date, odo: +m.odo }); });
      data.odoLogs.forEach(o => { if (o.date && o.odo > 0) pts.push({ date: o.date, odo: +o.odo }); });
      if (pts.length < 2) return null;
      pts.sort((a, b) => a.odo - b.odo);
      const first = pts[0], last = pts[pts.length - 1];
      const dist = last.odo - first.odo;
      const days = diffDays(parseDate(last.date), parseDate(first.date));
      if (dist <= 0 || days <= 0) return null;
      return { kmPerDay: dist / days, dist, days };
    }

    function computeScheduleStatus(item, data, usage) {
      const st = data.scheduleState[item.key] || {};
      const odo = data.vehicle.currentOdo || 0;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let remKm = null, remDays = null, nextOdo = null, nextDateStr = null, estDateStr = null;
      if (item.km != null && st.lastOdo != null) { nextOdo = st.lastOdo + item.km; remKm = nextOdo - odo; }
      else if (item.km != null) { nextOdo = item.km; remKm = nextOdo - odo; }
      if (item.months != null && st.lastDate) { const nd = addMonths(parseDate(st.lastDate), item.months); nextDateStr = nd.toISOString().slice(0,10); remDays = diffDays(nd, today); }
      // ทำนายวันครบกำหนดจากอัตราใช้รถ (เฉพาะรายการนับ กม. ที่ยังไม่เลย)
      if (remKm != null && remKm > 0 && usage && usage.kmPerDay > 0) {
        const d = new Date(today); d.setDate(d.getDate() + Math.round(remKm / usage.kmPerDay));
        estDateStr = d.toISOString().slice(0, 10);
      }
      const warnKm = data.settings.warnAheadKm, warnDays = data.settings.warnAheadDays;
      let level = 'ok'; // ok | warn | overdue | none
      const has = remKm != null || remDays != null;
      if (!has) level = 'none';
      const over = (remKm != null && remKm <= 0) || (remDays != null && remDays <= 0);
      const warn = (remKm != null && remKm <= warnKm) || (remDays != null && remDays <= warnDays);
      if (over) level = 'overdue'; else if (warn) level = 'warn';
      return { ...item, ...st, remKm, remDays, nextOdo, nextDateStr, estDateStr, level, done: !!(st.lastOdo != null || st.lastDate) };
    }

    function costPerKm(data) {
      const fuel = data.fuelLogs.reduce((s, f) => s + Number(f.totalCost || 0), 0);
      const maint = data.maintenanceLogs.reduce((s, m) => s + Number(m.cost || 0), 0);
      const odos = data.fuelLogs.map(f => f.odo).concat(data.maintenanceLogs.map(m => m.odo)).concat(data.odoLogs.map(o => o.odo)).filter(x => x > 0);
      const range = odos.length ? (data.vehicle.currentOdo - Math.min(...odos)) : 0;
      return range > 0 ? (fuel + maint) / range : null;
    }

    // ประเมินน้ำมันในถัง: อิงจากการเติมเต็มถังครั้งล่าสุด + ค่าเฉลี่ย กม./ล.
    function estimateFuel(data, fuelStats) {
      const avg = avgKmpl(fuelStats);
      if (!avg) return null;
      const fulls = data.fuelLogs.filter(f => f.isFull).sort((a, b) => a.odo - b.odo);
      if (!fulls.length) return null;
      const lastFull = fulls[fulls.length - 1];
      const kmSince = (data.vehicle.currentOdo || 0) - lastFull.odo;
      if (kmSince < 0) return null;
      const usedL = kmSince / avg;
      const remL = Math.max(0, TANK_L - usedL);
      const remKm = remL * avg;
      let level = 'ok';
      if (remL <= RESERVE_L) level = 'overdue';
      else if (remL <= RESERVE_L * 1.8) level = 'warn';
      return { avg, kmSince, usedL, remL, remKm, level, fullRangeKm: TANK_L * avg };
    }

    // วันสำรองข้อมูลล่าสุด (จำนวนวันที่ผ่านมา) — null ถ้ายังไม่เคย backup
    function daysSinceBackup(settings) {
      if (!settings.lastBackup) return null;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return diffDays(today, parseDate(settings.lastBackup));
    }

    // สร้างไฟล์ .ics (ปฏิทิน) จากรายการที่มีวันครบกำหนด
    function buildICS(events) {
      const pad = (n) => String(n).padStart(2, '0');
      const dt = (s) => { const d = parseDate(s); return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()); };
      const esc = (t) => String(t).replace(/([,;\\])/g, '\\$1').replace(/\n/g, '\\n');
      const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//XMAX Logbook//TH', 'CALSCALE:GREGORIAN'];
      events.forEach((ev, i) => {
        const start = dt(ev.date);
        const d = parseDate(ev.date); d.setDate(d.getDate() + 1);
        const end = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
        lines.push('BEGIN:VEVENT');
        lines.push('UID:xmax-' + ev.key + '-' + start + '-' + i + '@xmax.logbook');
        lines.push('DTSTART;VALUE=DATE:' + start);
        lines.push('DTEND;VALUE=DATE:' + end);
        lines.push('SUMMARY:' + esc('🛵 ' + ev.title));
        if (ev.desc) lines.push('DESCRIPTION:' + esc(ev.desc));
        lines.push('BEGIN:VALARM', 'TRIGGER:-P' + (ev.alarmDays || 7) + 'D', 'ACTION:DISPLAY', 'DESCRIPTION:' + esc(ev.title), 'END:VALARM');
        lines.push('END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      return lines.join('\r\n');
    }

    // บีบอัดรูปเป็น JPEG base64 ขนาดเล็ก (ประหยัดพื้นที่ localStorage)
    function compressImage(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            const scale = Math.min(1, maxDim / Math.max(w, h));
            w = Math.round(w * scale); h = Math.round(h * scale);
            const cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(cv.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }

    function downloadFile(content, filename, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    /* ===== GitHub Gist sync (token เก็บแยกจาก data — กันหลุดขึ้น gist) ===== */
    const SYNC_KEY = 'xmax_sync_v1';
    const GIST_FILE = 'xmax_data.json';
    function loadSync() { try { return { token: '', gistId: '', lastSync: '', ...(JSON.parse(localStorage.getItem(SYNC_KEY)) || {}) }; } catch (e) { return { token: '', gistId: '', lastSync: '' }; } }
    function saveSync(s) { try { localStorage.setItem(SYNC_KEY, JSON.stringify(s)); } catch (e) {} }
    const ghHeaders = (t) => ({ Authorization: 'Bearer ' + t, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' });
    async function gistCreate(token, data) {
      const r = await fetch('https://api.github.com/gists', { method: 'POST', headers: ghHeaders(token),
        body: JSON.stringify({ description: 'XMAX Logbook data (do not share)', public: false, files: { [GIST_FILE]: { content: JSON.stringify(data, null, 2) } } }) });
      if (!r.ok) throw new Error('สร้าง Gist ไม่สำเร็จ (' + r.status + ') — ตรวจสิทธิ์ token (ต้องมี scope gist)');
      return (await r.json()).id;
    }
    async function gistPush(token, gistId, data) {
      const r = await fetch('https://api.github.com/gists/' + gistId, { method: 'PATCH', headers: ghHeaders(token),
        body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data, null, 2) } } }) });
      if (!r.ok) throw new Error('ดันขึ้น Gist ไม่สำเร็จ (' + r.status + ')');
    }
    async function gistPull(token, gistId) {
      const r = await fetch('https://api.github.com/gists/' + gistId, { headers: ghHeaders(token) });
      if (!r.ok) throw new Error('ดึง Gist ไม่สำเร็จ (' + r.status + ')');
      const j = await r.json();
      const f = j.files && j.files[GIST_FILE];
      if (!f) throw new Error('ไม่พบไฟล์ ' + GIST_FILE + ' ใน Gist นี้');
      let content = f.content;
      if (f.truncated && f.raw_url) content = await (await fetch(f.raw_url)).text();
      return JSON.parse(content);
    }
    function mergeImport(parsed) {
      if (!parsed || (!parsed.vehicle && !parsed.fuelLogs)) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');
      return { ...structuredClone(DEFAULT_DATA), ...parsed,
        vehicle: { ...DEFAULT_DATA.vehicle, ...(parsed.vehicle || {}) },
        settings: { ...DEFAULT_DATA.settings, ...(parsed.settings || {}) } };
    }

    function PrimaryBtn({ children, onClick, className = '', disabled }) {

    /* ============================== APP ============================== */
    function App() {
      const [data, setData] = useState(loadData);
      const [tab, setTab] = useState('home');
      const [toast, setToast] = useState(null);
      const [sync, setSync] = useState(loadSync);
      const [remoteNewer, setRemoteNewer] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);
      const dataRef = useRef(data); dataRef.current = data;
      const pushTimer = useRef(null);
      const skipPush = useRef(true);

      useEffect(() => { saveData(data); }, [data]);
      useEffect(() => {
        const light = data.settings.theme === 'light';
        document.documentElement.classList.toggle('light', light);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', light ? '#eaeef6' : '#0a1a3c');
      }, [data.settings.theme]);
      const update = useCallback((fn) => setData(d => { const n = structuredClone(d); fn(n); return n; }), []);
      const showToast = useCallback((msg, action) => { setToast({ msg, action }); setTimeout(() => setToast(null), action ? 5000 : 2200); }, []);

      const exportData = useCallback(() => {
        setData(d => {
          downloadFile(JSON.stringify(d, null, 2), 'xmax_logbook_' + todayStr() + '.json', 'application/json');
          return { ...d, settings: { ...d.settings, lastBackup: todayStr() } };
        });
        showToast('สำรองข้อมูลแล้ว');
      }, []);

      const setSyncCfg = useCallback((s) => { saveSync(s); setSync(s); }, []);
      const connected = !!(sync.token && sync.gistId);
      const pushNow = useCallback(async (silent) => {
        if (!sync.token || !sync.gistId) return;
        try { await gistPush(sync.token, sync.gistId, dataRef.current); setSyncCfg({ ...sync, lastSync: new Date().toISOString() }); if (!silent) showToast('ดันขึ้น GitHub แล้ว'); }
        catch (e) { if (!silent) showToast('ซิงค์ไม่สำเร็จ: ' + e.message); }
      }, [sync]);
      const pullNow = useCallback(async () => {
        if (!sync.token || !sync.gistId) return;
        try { const remote = mergeImport(await gistPull(sync.token, sync.gistId)); skipPush.current = true; setData(remote); setSyncCfg({ ...sync, lastSync: new Date().toISOString() }); setRemoteNewer(false); showToast('ดึงข้อมูลล่าสุดแล้ว'); }
        catch (e) { showToast('ดึงไม่สำเร็จ: ' + e.message); }
      }, [sync]);

      // auto-push (debounced) เมื่อเปิด auto-sync
      useEffect(() => {
        if (skipPush.current) { skipPush.current = false; return; }
        if (!data.settings.autoSync || !connected) return;
        clearTimeout(pushTimer.current);
        pushTimer.current = setTimeout(() => pushNow(true), 3500);
        return () => clearTimeout(pushTimer.current);
      }, [data]);

      // เช็คตอนเปิดแอป ว่าคลาวด์ใหม่กว่าไหม
      useEffect(() => {
        (async () => {
          if (!sync.token || !sync.gistId || !sync.lastSync) return;
          try {
            const r = await fetch('https://api.github.com/gists/' + sync.gistId, { headers: ghHeaders(sync.token) });
            if (!r.ok) return;
            const j = await r.json();
            if (j.updated_at && new Date(j.updated_at).getTime() > new Date(sync.lastSync).getTime() + 5000) setRemoteNewer(true);
          } catch (e) {}
        })();
      }, []);

      // Quick Action จาก URL (?action=fuel|maint|odo)
      useEffect(() => {
        try { const p = new URLSearchParams(location.search).get('action'); if (p === 'fuel' || p === 'maint' || p === 'odo') { setTab('home'); setPendingAction(p); } } catch (e) {}
      }, []);

      const ctx = { data, update, setData, showToast, exportData, sync, setSyncCfg, connected, pushNow, pullNow, remoteNewer, setRemoteNewer, pendingAction, setPendingAction };

      const tabs = [
        { id: 'home', icon: '🏠', label: 'หน้าหลัก' },

        { id: 'report', icon: '📊', label: 'สรุป' },
        { id: 'info', icon: '⚙️', label: 'ข้อมูลรถ' },
      ];

      return (
        <div className="app-bg min-h-screen text-white relative">
          <div className="max-w-md mx-auto relative min-h-screen">

                  <div className="grid grid-cols-5 gap-1">
                    {tabs.map(t => {
                      const active = tab === t.id;
                      return (

                          className={'press flex flex-col items-center justify-center py-2 rounded-2xl transition ' + (active ? 'bg-brand/15' : '')}>
                          <span className={'text-[22px] leading-none transition ' + (active ? 'scale-110' : 'opacity-55 grayscale')}>{t.icon}</span>
                          <span className={'text-[10px] mt-1 font-semibold ' + (active ? 'text-brand' : 'text-slate-500')}>{t.label}</span>

            {toast && (

                <div className="glass-strong border border-emerald-400/30 text-emerald-200 px-5 py-3 rounded-2xl text-sm font-semibold shadow-xl flex items-center gap-3">
                  <span className="flex items-center gap-2"><span>✓</span>{toast.msg}</span>
                  {toast.action && <button onClick={() => { toast.action.fn(); setToast(null); }} className="press px-3 py-1 rounded-lg bg-emerald-400/20 border border-emerald-400/40 text-emerald-100 text-xs font-bold">{toast.action.label}</button>}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ภาพสกู๊ตเตอร์ XMAX แบบ SVG (side profile) */

    /* ============================== HOME ============================== */
    function HomeScreen({ ctx, go }) {
      const { data, update, showToast, exportData, remoteNewer, pullNow, pendingAction, setPendingAction } = ctx;
      const [odoOpen, setOdoOpen] = useState(false);
      const [fuelOpen, setFuelOpen] = useState(false);
      const [maintOpen, setMaintOpen] = useState(false);
      const [quickItem, setQuickItem] = useState(null);

      useEffect(() => {
        if (!pendingAction) return;
        if (pendingAction === 'fuel') setFuelOpen(true);
        else if (pendingAction === 'maint') setMaintOpen(true);
        else if (pendingAction === 'odo') setOdoOpen(true);
        setPendingAction(null);
      }, [pendingAction]);

      const fuelStats = useMemo(() => computeFuelStats(data.fuelLogs), [data.fuelLogs]);
      const avg = avgKmpl(fuelStats);
      const lastFuel = [...data.fuelLogs].sort((a, b) => (a.date < b.date ? 1 : -1))[0];
      const cpk = costPerKm(data);
      const fuelEst = useMemo(() => estimateFuel(data, fuelStats), [data, fuelStats]);
      const backupDays = daysSinceBackup(data.settings);
      const backupDue = backupDays == null ? (data.fuelLogs.length + data.maintenanceLogs.length > 0) : backupDays >= data.settings.backupIntervalDays;

      const usage = useMemo(() => computeUsage(data), [data]);
      const alerts = useMemo(() => activeSchedule(data.settings)
        .map(it => computeScheduleStatus(it, data, usage))
        .filter(s => s.level === 'overdue' || s.level === 'warn')
        .sort((a, b) => {
          const order = { overdue: 0, warn: 1 };
          if (order[a.level] !== order[b.level]) return order[a.level] - order[b.level];
          return (a.remKm ?? 9e9) - (b.remKm ?? 9e9);
        }), [data, usage]);

      const markDone = (item) => {
        update(d => {
          d.scheduleState[item.key] = { lastOdo: d.vehicle.currentOdo, lastDate: todayStr() };
          d.maintenanceLogs.push({ id: uuid(), date: todayStr(), odo: d.vehicle.currentOdo, itemKey: item.key, title: item.title, cost: 0, shop: '', note: 'ทำผ่านปุ่มลัด' });
        });
        showToast('บันทึก "' + item.title + '" แล้ว');
      };

      return (
        <div className="px-4 pt-safe">
          <div className="pt-3 pb-4 flex items-center justify-between">
            <div>
              <div className="text-[13px] text-slate-400 font-medium">{data.vehicle.nickname || 'XMAX'} {data.vehicle.plate && '· ' + data.vehicle.plate}</div>
              <div className="text-2xl font-extrabold tracking-tight">XMAX Logbook</div>
            </div>
            <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand/30 to-cyan-400/10 border border-brand/30 flex items-center justify-center text-xl">🛵</div>
          </div>

          {/* Remote newer (cloud) */}
          {remoteNewer && (
            <div className="mb-3 anim-pop">
              <div className="rounded-2xl bg-brand/10 border border-brand/30 p-3.5 flex items-center gap-3">
                <div className="text-xl">☁️</div>
                <div className="flex-1 min-w-0">
                  <div className="text-[14px] font-bold text-brand">มีข้อมูลใหม่กว่าบนคลาวด์</div>
                  <div className="text-[12px] text-slate-400">อัปเดตจากอีกเครื่อง — ดึงลงมาใช้ไหม?</div>
                </div>
                <button onClick={pullNow} className="press px-3.5 py-2 rounded-xl bg-brand/20 border border-brand/40 text-brand text-[13px] font-bold flex-shrink-0">Pull</button>
              </div>
            </div>
          )}

          {/* Backup reminder */}
          {backupDue && (
            <div className="mb-3 anim-pop">
              <div className="rounded-2xl bg-amber-400/10 border border-amber-400/25 p-3.5 flex items-center gap-3">
                <div className="text-xl">💾</div>
                <div className="flex-1 min-w-0">
                  <div className="text-[14px] font-bold text-amber-200">ควรสำรองข้อมูล</div>
                  <div className="text-[12px] text-amber-200/70">{backupDays == null ? 'ยังไม่เคยสำรอง — Safari อาจล้างข้อมูลได้' : 'สำรองล่าสุด ' + backupDays + ' วันก่อน'}</div>
                </div>
                <button onClick={exportData} className="press px-3.5 py-2 rounded-xl bg-amber-400/20 border border-amber-400/30 text-amber-100 text-[13px] font-bold flex-shrink-0">Export</button>
              </div>
            </div>
          )}

          {/* Hero — Yamaha Connect style */}
          <Card glow className="overflow-hidden anim-pop">
            <div className="relative">
              <div className="absolute inset-0" style={{ background: 'radial-gradient(120% 110% at 85% -10%, rgba(56,189,248,0.20), transparent 55%)' }}></div>
              <div className="absolute -left-10 top-10 w-44 h-44 rounded-full bg-brand/10 blur-3xl"></div>
              <div className="relative p-5">
                <div className="flex items-start justify-between">
                  <div>
                    <div className="text-[12px] text-brand font-extrabold uppercase tracking-[0.22em]">XMAX 300</div>
                    <div className="text-[13px] text-slate-400 mt-0.5">{data.vehicle.nickname || 'XMAX'}{data.vehicle.plate ? ' · ' + data.vehicle.plate : ''}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-[10px] text-slate-500 uppercase tracking-wider">สถานะ</div>
                    <div className={'text-[13px] font-bold ' + (alerts.length ? 'text-amber-300' : 'text-emerald-300')}>{alerts.length ? '⚠ ' + alerts.length + ' รายการ' : '● พร้อมใช้'}</div>
                  </div>
                </div>

                <ScooterArt className="w-full h-36 my-1" />

                <div className="flex items-end justify-between">
                  <div>
                    <div className="text-[10px] text-slate-500 uppercase tracking-[0.18em]">เลขไมล์รวม</div>
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-[2.7rem] leading-none font-black tracking-tight num">{fmt(data.vehicle.currentOdo)}</span>
                      <span className="text-base text-slate-400 font-semibold">กม.</span>
                    </div>
                  </div>
                  <button onClick={() => setOdoOpen(true)} className="press px-4 py-2.5 rounded-2xl bg-brand/15 border border-brand/30 text-brand text-sm font-bold">อัปเดต</button>
                </div>

                {fuelEst && (
                  <div className="mt-4">
                    <div className="flex items-center justify-between text-[12px] mb-1.5">
                      <span className={'font-semibold ' + (fuelEst.level === 'overdue' ? 'text-rose-400' : fuelEst.level === 'warn' ? 'text-amber-300' : 'text-slate-300')}>⛽ วิ่งได้อีก ~{fmt(fuelEst.remKm)} กม.{fuelEst.level === 'overdue' ? ' · ใกล้หมด!' : fuelEst.level === 'warn' ? ' · ควรเติม' : ''}</span>
                      <span className="num text-slate-500">{fmt(fuelEst.remL, 1)}/{TANK_L} ล.</span>
                    </div>
                    <div className="h-2.5 rounded-full bg-white/10 overflow-hidden">
                      <div className={'h-full rounded-full transition-all ' + (fuelEst.level === 'overdue' ? 'bg-rose-500' : fuelEst.level === 'warn' ? 'bg-amber-400' : 'bg-gradient-to-r from-brand to-cyan-300')} style={{ width: Math.max(2, Math.min(100, (fuelEst.remL / TANK_L) * 100)) + '%' }}></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </Card>

          {/* Quick stats */}
          <div className="grid grid-cols-3 gap-3 mt-3">
            <MiniStat label="เฉลี่ย" value={avg ? fmt(avg, 1) : '–'} unit="กม./ล." accent="text-brand" />
            <MiniStat label="ราคาเติมล่าสุด" value={lastFuel ? fmt(lastFuel.pricePerL, 2) : '–'} unit="฿/ล." accent="text-cyan-300" />
            <MiniStat label="ต้นทุน/กม." value={cpk ? fmt(cpk, 2) : '–'} unit="฿/กม." accent="text-emerald-300" />
          </div>

          {/* Actions */}
          <div className="grid grid-cols-2 gap-3 mt-3">
            <button onClick={() => setFuelOpen(true)} className="press p-4 rounded-3xl bg-gradient-to-br from-brand/20 to-brand/5 border border-brand/25 text-left">
              <div className="text-2xl">⛽</div>
              <div className="font-bold mt-1.5">เติมน้ำมัน</div>
              <div className="text-[12px] text-slate-400">บันทึกการเติม</div>
            </button>
            <button onClick={() => setMaintOpen(true)} className="press p-4 rounded-3xl bg-gradient-to-br from-emerald-500/15 to-emerald-500/5 border border-emerald-500/25 text-left">
              <div className="text-2xl">🔧</div>
              <div className="font-bold mt-1.5">บันทึกซ่อม</div>
              <div className="text-[12px] text-slate-400">บันทึกการบำรุง</div>
            </button>
          </div>

          {/* Alerts */}
          <div className="mt-6 mb-2 flex items-center justify-between">
            <h2 className="text-lg font-bold">การแจ้งเตือน</h2>
            {alerts.length > 0 && <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-rose-500/15 text-rose-300">{alerts.length} รายการ</span>}
          </div>

          {alerts.length === 0 ? (
            <Card className="p-6 text-center">
              <div className="text-3xl mb-1">✨</div>
              <div className="font-semibold text-slate-300">ไม่มีรายการใกล้ถึงกำหนด</div>
              <div className="text-[13px] text-slate-500 mt-0.5">ดูแลรถได้ดีมาก</div>
            </Card>
          ) : (
            <div className="space-y-2.5">
              {alerts.map(a => {
                const l = LEVEL[a.level];
                return (
                  <Card key={a.key} className={'p-4 ring-1 ' + l.ring}>
                    <div className="flex items-start gap-3">
                      <div className="text-2xl mt-0.5">{a.icon}</div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between gap-2">
                          <div className="font-bold truncate">{a.title}</div>
                          <StatusChip level={a.level} />
                        </div>
                        <div className={'text-[13px] mt-1 font-medium ' + l.text}>
                          {a.remKm != null && (a.remKm <= 0 ? 'เลย ' + fmt(-a.remKm) + ' กม.' : 'อีก ' + fmt(a.remKm) + ' กม.')}
                          {a.remKm != null && a.remDays != null && ' · '}
                          {a.remDays != null && (a.remDays <= 0 ? 'เลย ' + fmt(-a.remDays) + ' วัน' : 'อีก ' + fmt(a.remDays) + ' วัน')}
                          {a.nextOdo != null && <span className="text-slate-500"> · ครบที่ {fmt(a.nextOdo)}</span>}
                        </div>
                        {a.estDateStr && <div className="text-[12px] text-slate-500 mt-0.5">📅 คาดประมาณ {thDate(a.estDateStr)}</div>}
                      </div>
                    </div>
                    <button onClick={() => setQuickItem(a)} className="press mt-3 w-full py-2.5 rounded-xl bg-white/[0.06] border border-white/10 text-sm font-bold text-brand">ทำแล้ว ✓</button>
                  </Card>
                );
              })}
            </div>
          )}

          <OdoSheet open={odoOpen} onClose={() => setOdoOpen(false)} ctx={ctx} />
          <FuelSheet open={fuelOpen} onClose={() => setFuelOpen(false)} ctx={ctx} />
          <MaintSheet open={maintOpen} onClose={() => setMaintOpen(false)} ctx={ctx} />
          <ConfirmDone item={quickItem} onClose={() => setQuickItem(null)} onConfirm={() => { markDone(quickItem); setQuickItem(null); }} odo={data.vehicle.currentOdo} />
        </div>
      );
    }

    function MiniStat({ label, value, unit, accent }) {
      return (
        <Card className="p-3.5">
          <div className="text-[11px] text-slate-500 font-medium leading-tight h-7">{label}</div>
          <div className={'text-2xl font-black num ' + accent}>{value}</div>
          <div className="text-[10px] text-slate-500 font-medium">{unit}</div>
        </Card>
      );
    }

    function ConfirmDone({ item, onClose, onConfirm, odo }) {
      if (!item) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 anim-fade" onMouseDown={onClose}>
          <div className="absolute inset-0 bg-black/60"></div>
          <div className="relative w-full max-w-sm glass-strong border border-white/10 rounded-3xl p-6 anim-pop" onMouseDown={e => e.stopPropagation()}>
            <div className="text-4xl text-center mb-2">{item.icon}</div>
            <div className="text-center font-bold text-lg">บันทึกว่าทำแล้ว?</div>
            <div className="text-center text-slate-400 text-sm mt-1">{item.title}</div>
            <div className="text-center text-slate-500 text-xs mt-2">จะตั้งค่าวันที่ {thDate(todayStr())} · เลขไมล์ {fmt(odo)} กม.</div>
            <div className="grid grid-cols-2 gap-3 mt-5">
              <GhostBtn onClick={onClose} className="text-center">ยกเลิก</GhostBtn>
              <PrimaryBtn onClick={onConfirm} className="!py-3.5">ยืนยัน</PrimaryBtn>
            </div>
          </div>
        </div>
      );
    }

    /* ============================== SHEETS ============================== */
    function OdoSheet({ open, onClose, ctx }) {
      const { data, update, showToast } = ctx;
      const [odo, setOdo] = useState('');
      const [note, setNote] = useState('');
      useEffect(() => { if (open) { setOdo(String(data.vehicle.currentOdo || '')); setNote(''); } }, [open]);
      const save = () => {
        const v = parseFloat(odo);
        if (isNaN(v)) return;
        update(d => { d.vehicle.currentOdo = v; d.odoLogs.push({ id: uuid(), date: todayStr(), odo: v, note }); });
        showToast('อัปเดตเลขไมล์เป็น ' + fmt(v) + ' กม.');
        onClose();
      };
      return (
        <Sheet open={open} onClose={onClose} title="อัปเดตเลขไมล์">
          <div className="space-y-4">
            <Field label="เลขไมล์ปัจจุบัน (กม.)"><NumInput value={odo} onChange={setOdo} placeholder="0" /></Field>
            <Field label="หมายเหตุ (ถ้ามี)"><TextInput value={note} onChange={setNote} placeholder="เช่น เติมน้ำมันเช้านี้" /></Field>
            <PrimaryBtn onClick={save}>บันทึก</PrimaryBtn>
          </div>
        </Sheet>
      );
    }

    function FuelSheet({ open, onClose, ctx, edit }) {
      const { data, update, showToast } = ctx;
      const [f, setF] = useState({});
      const photoRef = useRef(null);
      useEffect(() => {
        if (open) setF(edit ? { ...edit } : { date: todayStr(), odo: String(data.vehicle.currentOdo || ''), liters: '', pricePerL: '', totalCost: '', isFull: true, station: '', note: '', photo: '' });
      }, [open]);
      const set = (k, v) => setF(p => ({ ...p, [k]: v }));
      const onPhoto = async (e) => { const file = e.target.files[0]; if (!file) return; try { set('photo', await compressImage(file, 1000, 0.6)); } catch (err) { alert('แนบรูปไม่สำเร็จ'); } e.target.value = ''; };

      // auto-calc total from liters * price
      const onLiters = (v) => { setF(p => { const t = (parseFloat(v) * parseFloat(p.pricePerL)); return { ...p, liters: v, totalCost: (!isNaN(t) ? t.toFixed(2) : p.totalCost) }; }); };
      const onPrice = (v) => { setF(p => { const t = (parseFloat(p.liters) * parseFloat(v)); return { ...p, pricePerL: v, totalCost: (!isNaN(t) ? t.toFixed(2) : p.totalCost) }; }); };
      const onTotal = (v) => { setF(p => { const pr = (parseFloat(v) / parseFloat(p.liters)); return { ...p, totalCost: v, pricePerL: (!isNaN(pr) && isFinite(pr) ? pr.toFixed(2) : p.pricePerL) }; }); };

      const save = () => {
        const odo = parseFloat(f.odo), liters = parseFloat(f.liters);
        if (isNaN(odo) || isNaN(liters)) return;
        const maxOdo = Math.max(0, ...data.fuelLogs.filter(x => x.id !== (edit && edit.id)).map(x => x.odo), data.vehicle.currentOdo || 0);
        if (odo < maxOdo - 1 && !confirm('เลขไมล์ ' + fmt(odo) + ' น้อยกว่าค่าล่าสุด (' + fmt(maxOdo) + ' กม.) — บันทึกต่อไหม?')) return;
        const rec = { id: edit ? edit.id : uuid(), date: f.date, odo, liters, pricePerL: parseFloat(f.pricePerL) || 0, totalCost: parseFloat(f.totalCost) || 0, isFull: !!f.isFull, station: f.station || '', note: f.note || '', photo: f.photo || '' };
        update(d => {
          if (edit) { const i = d.fuelLogs.findIndex(x => x.id === edit.id); if (i >= 0) d.fuelLogs[i] = rec; }
          else d.fuelLogs.push(rec);
          if (odo > (d.vehicle.currentOdo || 0)) d.vehicle.currentOdo = odo;
        });
        showToast(edit ? 'แก้ไขแล้ว' : 'บันทึกการเติมน้ำมันแล้ว');
        onClose();
      };

      return (
        <Sheet open={open} onClose={onClose} title={edit ? 'แก้ไขการเติมน้ำมัน' : 'เติมน้ำมัน'}>
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <Field label="วันที่"><DateInput value={f.date} onChange={v => set('date', v)} /></Field>
              <Field label="เลขไมล์ (กม.)"><NumInput value={f.odo} onChange={v => set('odo', v)} placeholder="0" /></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="จำนวนลิตร"><NumInput value={f.liters} onChange={onLiters} placeholder="0.00" /></Field>
              <Field label="ราคา/ลิตร (฿)"><NumInput value={f.pricePerL} onChange={onPrice} placeholder="0.00" /></Field>
            </div>
            <Field label="จำนวนเงินรวม (฿)" hint="กรอกช่องใดก็ได้ ระบบคำนวณให้อัตโนมัติ"><NumInput value={f.totalCost} onChange={onTotal} placeholder="0.00" /></Field>

            <button onClick={() => set('isFull', !f.isFull)} className="press w-full flex items-center justify-between p-4 rounded-2xl bg-ink-900/80 border border-white/[0.08]">
              <div className="text-left">
                <div className="font-semibold text-[15px]">เติมเต็มถัง</div>
                <div className="text-[12px] text-slate-500">ใช้คำนวณอัตราสิ้นเปลือง กม./ลิตร</div>
              </div>
              <div className={'w-12 h-7 rounded-full transition relative ' + (f.isFull ? 'bg-brand' : 'bg-white/15')}>
                <div className={'absolute top-0.5 w-6 h-6 rounded-full bg-white transition-all ' + (f.isFull ? 'left-[1.4rem]' : 'left-0.5')}></div>
              </div>
            </button>

            <div className="grid grid-cols-2 gap-3">
              <Field label="ปั๊ม (ถ้ามี)"><TextInput value={f.station} onChange={v => set('station', v)} placeholder="PT, PTT..." /></Field>
              <Field label="หมายเหตุ"><TextInput value={f.note} onChange={v => set('note', v)} placeholder="" /></Field>
            </div>
            <Field label="รูปใบเสร็จ (ถ้ามี)">
              <input ref={photoRef} type="file" accept="image/*" className="hidden" onChange={onPhoto} />
              {f.photo ? (
                <div className="relative">
                  <img src={f.photo} alt="แนบรูป" className="w-full max-h-56 object-contain rounded-2xl border border-white/10 bg-ink-900/80" />
                  <button onClick={() => set('photo', '')} className="press absolute top-2 right-2 w-8 h-8 rounded-full bg-black/60 text-white flex items-center justify-center">✕</button>
                </div>
              ) : <GhostBtn onClick={() => photoRef.current.click()} className="w-full text-center">📷 เลือกรูป (บีบอัดอัตโนมัติ)</GhostBtn>}
            </Field>
            <PrimaryBtn onClick={save}>{edit ? 'บันทึกการแก้ไข' : 'บันทึก'}</PrimaryBtn>
          </div>
        </Sheet>
      );
    }

    function MaintSheet({ open, onClose, ctx, edit, presetKey }) {
      const { data, update, showToast } = ctx;
      const [m, setM] = useState({});
      const photoRef = useRef(null);
      const allItems = activeSchedule(data.settings);
      useEffect(() => {
        if (open) setM(edit ? { ...edit } : { date: todayStr(), odo: String(data.vehicle.currentOdo || ''), itemKey: presetKey || allItems[0].key, cost: '', shop: '', note: '', photo: '' });
      }, [open]);
      const set = (k, v) => setM(p => ({ ...p, [k]: v }));
      const item = allItems.find(i => i.key === m.itemKey);
      const onPhoto = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        try { const b64 = await compressImage(file, 1000, 0.6); set('photo', b64); }
        catch (err) { alert('แนบรูปไม่สำเร็จ'); }
        e.target.value = '';
      };

      const save = () => {
        const odo = parseFloat(m.odo);
        if (isNaN(odo)) return;
        const it = allItems.find(i => i.key === m.itemKey);
        const rec = { id: edit ? edit.id : uuid(), date: m.date, odo, itemKey: m.itemKey, title: it ? it.title : (m.title || 'อื่นๆ'), cost: parseFloat(m.cost) || 0, shop: m.shop || '', note: m.note || '', photo: m.photo || '' };
        update(d => {
          if (edit) { const i = d.maintenanceLogs.findIndex(x => x.id === edit.id); if (i >= 0) d.maintenanceLogs[i] = rec; }
          else d.maintenanceLogs.push(rec);
          if (odo > (d.vehicle.currentOdo || 0)) d.vehicle.currentOdo = odo;
          // reset schedule clock for this item
          const cur = d.scheduleState[m.itemKey];
          if (!cur || odo >= (cur.lastOdo || 0)) d.scheduleState[m.itemKey] = { lastOdo: odo, lastDate: m.date };
        });
        showToast(edit ? 'แก้ไขแล้ว' : 'บันทึกการบำรุงแล้ว');
        onClose();
      };

      return (
        <Sheet open={open} onClose={onClose} title={edit ? 'แก้ไขประวัติซ่อม' : 'บันทึกการบำรุงรักษา'}>
          <div className="space-y-4">
            <Field label="รายการ">
              <select value={m.itemKey} onChange={e => set('itemKey', e.target.value)} className={inputCls + ' appearance-none'}>
                {allItems.map(i => <option key={i.key} value={i.key} className="bg-ink-850">{i.icon + ' ' + i.title}</option>)}
              </select>
            </Field>
            {item && item.spec && <div className="text-[12px] text-slate-400 -mt-2 px-1 leading-relaxed">📌 {item.spec}</div>}
            <div className="grid grid-cols-2 gap-3">
              <Field label="วันที่"><DateInput value={m.date} onChange={v => set('date', v)} /></Field>
              <Field label="เลขไมล์ (กม.)"><NumInput value={m.odo} onChange={v => set('odo', v)} placeholder="0" /></Field>
            </div>
            <Field label="ค่าใช้จ่าย (฿)"><NumInput value={m.cost} onChange={v => set('cost', v)} placeholder="0" /></Field>

    /* ============================== FUEL SCREEN ============================== */
    function FuelScreen({ ctx }) {

                        <div className="text-[13px] mt-1 font-semibold text-brand num">⚡ {fmt(f.kmpl, 2)} กม./ล. <span className="text-slate-500 font-normal">({fmt(f.dist)} กม.)</span></div>
                      )}

    /* ============================== MAINT SCREEN ============================== */
    function MaintScreen({ ctx }) {
      const { data, update, showToast } = ctx;
      const [sub, setSub] = useState('schedule');
      const [open, setOpen] = useState(false);
      const [edit, setEdit] = useState(null);
      const [presetKey, setPresetKey] = useState(null);
      const [quickItem, setQuickItem] = useState(null);
      const [filter, setFilter] = useState('all'); // all | due | diy | shop
      const [viewPhoto, setViewPhoto] = useState(null);

      const usage = useMemo(() => computeUsage(data), [data]);
      const items = useMemo(() => activeSchedule(data.settings).map(it => computeScheduleStatus(it, data, usage)), [data, usage]);
      const sortedAll = [...items].sort((a, b) => {
        const rank = { overdue: 0, warn: 1, ok: 2, none: 3 };
        if (rank[a.level] !== rank[b.level]) return rank[a.level] - rank[b.level];
        return (a.remKm ?? 9e9) - (b.remKm ?? 9e9);
      });
      const sorted = sortedAll.filter(s =>
        filter === 'all' ? true :
        filter === 'due' ? (s.level === 'overdue' || s.level === 'warn') :
        filter === 'diy' ? !s.star :
        filter === 'shop' ? s.star : true
      );
      const dueCount = sortedAll.filter(s => s.level === 'overdue' || s.level === 'warn').length;
      const history = [...data.maintenanceLogs].sort((a, b) => (a.date < b.date ? 1 : (a.date > b.date ? -1 : b.odo - a.odo)));

      const markDone = (item) => {
        update(d => {
          d.scheduleState[item.key] = { lastOdo: d.vehicle.currentOdo, lastDate: todayStr() };
          d.maintenanceLogs.push({ id: uuid(), date: todayStr(), odo: d.vehicle.currentOdo, itemKey: item.key, title: item.title, cost: 0, shop: '', note: 'ทำผ่านปุ่มลัด' });
        });
        showToast('บันทึก "' + item.title + '" แล้ว');
      };
      const delHist = (id) => {
        const rec = data.maintenanceLogs.find(x => x.id === id); if (!rec) return;
        update(d => { d.maintenanceLogs = d.maintenanceLogs.filter(x => x.id !== id); });

      return (
        <div className="px-4 pt-safe">
          <Header title="ซ่อมบำรุง" subtitle="Yamaha XMAX 300" />

          <div className="flex gap-1 p-1 rounded-2xl bg-ink-900/80 border border-white/[0.06] mb-4">
            {[['schedule', 'ตารางบำรุง'], ['history', 'ประวัติ']].map(([k, l]) => (
              <button key={k} onClick={() => setSub(k)} className={'flex-1 py-2.5 rounded-xl text-sm font-bold transition ' + (sub === k ? 'bg-brand text-ink-950' : 'text-slate-400')}>{l}</button>
            ))}
          </div>

          {sub === 'schedule' ? (
            <div className="space-y-2.5">
              <div className="flex gap-2 overflow-x-auto no-scrollbar -mx-4 px-4 pb-1">
                {[['all', 'ทั้งหมด'], ['due', 'ใกล้ถึง' + (dueCount ? ' (' + dueCount + ')' : '')], ['diy', '🔧 ทำเอง'], ['shop', '★ งานศูนย์']].map(([k, l]) => (
                  <button key={k} onClick={() => setFilter(k)} className={'press flex-shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-bold border transition ' + (filter === k ? 'bg-brand text-ink-950 border-brand' : 'bg-white/[0.06] text-slate-300 border-white/10')}>{l}</button>
                ))}
              </div>
              {usage && <div className="text-[12px] text-slate-500 px-1 num">📊 ใช้รถเฉลี่ย ~{fmt(usage.kmPerDay, 0)} กม./วัน — ใช้ทำนายวันครบกำหนด</div>}
              {sorted.length === 0 && <EmptyState icon="✨" title="ไม่มีรายการในหมวดนี้" sub="ลองเลือกตัวกรองอื่น" />}
              {sorted.map(s => {
                const l = LEVEL[s.level];
                return (
                  <Card key={s.key} className={'p-4 ' + (s.level === 'overdue' || s.level === 'warn' ? 'ring-1 ' + l.ring : '')}>

                      <div className="text-2xl mt-0.5">{s.icon}</div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between gap-2">
                          <div className="font-bold truncate flex items-center gap-1.5">{s.title}{s.star && <span className="text-amber-400 text-xs">★</span>}</div>
                          <StatusChip level={s.level} />
                        </div>
                        <div className="text-[12px] text-slate-500 mt-0.5">
                          {s.km != null && 'ทุก ' + fmt(s.km) + ' กม.'}{s.km != null && s.months != null && ' · '}{s.months != null && 'ทุก ' + s.months + ' เดือน'}
                        </div>
                        <div className="text-[12px] text-slate-400 mt-1.5 leading-relaxed">{s.spec}</div>

                        <div className="mt-2 flex flex-wrap gap-x-3 gap-y-1 text-[12px]">
                          {s.done ? (
                            <>
                              {s.lastOdo != null && <span className="text-slate-500">ล่าสุด: <span className="text-slate-300 num">{fmt(s.lastOdo)} กม.</span></span>}
                              {s.lastDate && <span className="text-slate-500">{thDate(s.lastDate)}</span>}
                            </>
                          ) : <span className="text-slate-600">ยังไม่เคยบันทึก</span>}
                        </div>
                        {(s.remKm != null || s.remDays != null) && (
                          <div className={'text-[13px] mt-1 font-semibold ' + l.text}>
                            {s.remKm != null && (s.remKm <= 0 ? 'เลย ' + fmt(-s.remKm) + ' กม.' : 'อีก ' + fmt(s.remKm) + ' กม.')}
                            {s.remKm != null && s.remDays != null && ' · '}
                            {s.remDays != null && (s.remDays <= 0 ? 'เลย ' + fmt(-s.remDays) + ' วัน' : 'อีก ' + fmt(s.remDays) + ' วัน')}
                          </div>
                        )}
                        {s.estDateStr && <div className="text-[12px] text-slate-500 mt-0.5">📅 คาดถึงกำหนดประมาณ {thDate(s.estDateStr)}</div>}
                      </div>

                    <div className="grid grid-cols-2 gap-2 mt-3">
                      <button onClick={() => setQuickItem(s)} className="press py-2.5 rounded-xl bg-brand/15 border border-brand/25 text-sm font-bold text-brand">ทำแล้ว ✓</button>
                      <button onClick={() => { setPresetKey(s.key); setEdit(null); setOpen(true); }} className="press py-2.5 rounded-xl bg-white/[0.06] border border-white/10 text-sm font-bold text-slate-300">บันทึกแบบละเอียด</button>
                    </div>
                  </Card>
                );
              })}
            </div>
          ) : (
            <>
              <button onClick={() => { setPresetKey(null); setEdit(null); setOpen(true); }} className="press w-full mb-4 py-3.5 rounded-2xl bg-gradient-to-r from-emerald-400 to-emerald-300 text-ink-950 font-bold">+ บันทึกการบำรุง</button>
              {history.length === 0 ? <EmptyState icon="🔧" title="ยังไม่มีประวัติ" sub="บันทึกการบำรุงครั้งแรกของคุณ" /> : (
                <div className="relative pl-6">
                  <div className="absolute left-[7px] top-2 bottom-2 w-0.5 bg-white/10"></div>
                  <div className="space-y-3">
                    {history.map(h => {
                      const it = activeSchedule(data.settings).find(i => i.key === h.itemKey);
                      return (
                        <div key={h.id} className="relative">
                          <div className="absolute -left-[1.4rem] top-3 w-3.5 h-3.5 rounded-full bg-brand border-2 border-ink-900"></div>
                          <Card className="p-4">
                            <div className="flex items-start justify-between gap-2">
                              <div className="flex-1 min-w-0">
                                <div className="font-bold flex items-center gap-1.5">{it ? it.icon : '🔧'} {h.title}</div>
                                <div className="text-[12px] text-slate-400 mt-1 num">{thDate(h.date)} · ไมล์ {fmt(h.odo)} กม.</div>
                                {h.shop && <div className="text-[12px] text-slate-500 mt-0.5">🏪 {h.shop}</div>}
                                {h.note && <div className="text-[12px] text-slate-500 mt-0.5">{h.note}</div>}
                                {h.photo && <img src={h.photo} onClick={() => setViewPhoto(h.photo)} alt="รูปแนบ" className="press mt-2 h-16 w-16 object-cover rounded-xl border border-white/10 cursor-pointer" />}
                              </div>
                              <div className="text-right flex-shrink-0">
                                {h.cost > 0 && <div className="font-black num text-emerald-300">{baht(h.cost)}</div>}
                                <div className="flex gap-1 mt-2 justify-end">
                                  <button onClick={() => { setEdit(h); setPresetKey(null); setOpen(true); }} className="press text-xs px-2 py-1 rounded-lg bg-white/[0.06] text-slate-300">แก้ไข</button>
                                  <button onClick={() => delHist(h.id)} className="press text-xs px-2 py-1 rounded-lg bg-rose-500/10 text-rose-300">ลบ</button>

                          </Card>
                        </div>
                      );
                    })}

                </div>
              )}

          )}

          <MaintSheet open={open} onClose={() => { setOpen(false); setEdit(null); setPresetKey(null); }} ctx={ctx} edit={edit} presetKey={presetKey} />
          <ConfirmDone item={quickItem} onClose={() => setQuickItem(null)} onConfirm={() => { markDone(quickItem); setQuickItem(null); }} odo={data.vehicle.currentOdo} />
          {viewPhoto && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 anim-fade" onMouseDown={() => setViewPhoto(null)}>
              <div className="absolute inset-0 bg-black/85"></div>
              <img src={viewPhoto} alt="รูป" className="relative max-w-full max-h-[88vh] object-contain rounded-2xl anim-pop" />
              <button onClick={() => setViewPhoto(null)} className="press absolute top-6 right-6 w-10 h-10 rounded-full bg-white/15 text-white flex items-center justify-center text-lg">✕</button>
            </div>
          )}
        </div>
      );
    }

    /* ============================== REPORT SCREEN ============================== */
    function ReportScreen({ ctx }) {
      const { data } = ctx;
      const fuelStats = useMemo(() => computeFuelStats(data.fuelLogs), [data.fuelLogs]);

      const totalFuel = data.fuelLogs.reduce((s, f) => s + Number(f.totalCost || 0), 0);
      const totalMaint = data.maintenanceLogs.reduce((s, m) => s + Number(m.cost || 0), 0);
      const cpk = costPerKm(data);
      const odos = data.fuelLogs.map(f => f.odo).concat(data.maintenanceLogs.map(m => m.odo)).concat(data.odoLogs.map(o => o.odo)).filter(x => x > 0);
      const dist = odos.length ? data.vehicle.currentOdo - Math.min(...odos) : 0;

      // monthly aggregation
      const monthMap = {};
      data.fuelLogs.forEach(f => { const k = monthKey(f.date); if (!k) return; (monthMap[k] = monthMap[k] || { fuel: 0, maint: 0 }).fuel += Number(f.totalCost || 0); });
      data.maintenanceLogs.forEach(m => { const k = monthKey(m.date); if (!k) return; (monthMap[k] = monthMap[k] || { fuel: 0, maint: 0 }).maint += Number(m.cost || 0); });
      const monthly = Object.keys(monthMap).sort().slice(-6).map(k => ({ name: thMonthYear(k + '-01').replace(' 25', ' '), 'น้ำมัน': Math.round(monthMap[k].fuel), 'ซ่อมบำรุง': Math.round(monthMap[k].maint) }));

      const effData = fuelStats.filter(f => f.kmpl != null).map(f => ({ name: thDate(f.date).slice(0, 6), value: +f.kmpl.toFixed(2) }));
      const priceData = [...data.fuelLogs].filter(f => f.pricePerL > 0).sort((a, b) => (a.date < b.date ? -1 : 1)).map(f => ({ name: thDate(f.date).slice(0, 6), value: +Number(f.pricePerL).toFixed(2) }));

      // ค่าใช้จ่ายแยกหมวด
      const thaiKeys = new Set(THAI_ITEMS.map(i => i.key));
      let legalCost = 0, repairCost = 0;
      data.maintenanceLogs.forEach(m => { (thaiKeys.has(m.itemKey) ? (legalCost += Number(m.cost || 0)) : (repairCost += Number(m.cost || 0))); });
      const cats = [
        { name: 'น้ำมัน', amount: totalFuel, color: '#38bdf8' },
        { name: 'ซ่อมบำรุง/อะไหล่', amount: repairCost, color: '#34d399' },
        { name: 'ภาษี/พ.ร.บ./ประกัน', amount: legalCost, color: '#a78bfa' },
      ].filter(c => c.amount > 0);
      const catTotal = cats.reduce((s, c) => s + c.amount, 0);

      // งบรายเดือน (เดือนปัจจุบัน)
      const curMonth = todayStr().slice(0, 7);
      const monthSpend = (monthMap[curMonth] ? monthMap[curMonth].fuel + monthMap[curMonth].maint : 0);
      const budget = Number(data.settings.monthlyBudget || 0);

      // สถิติตลอดอายุ
      const kmpls = fuelStats.filter(f => f.kmpl != null).map(f => f.kmpl);
      const usage = computeUsage(data);
      const monthKeys = Object.keys(monthMap);
      let topMonth = null, topVal = 0;
      monthKeys.forEach(k => { const v = monthMap[k].fuel + monthMap[k].maint; if (v > topVal) { topVal = v; topMonth = k; } });
      const totalLiters = data.fuelLogs.reduce((s, f) => s + Number(f.liters || 0), 0);
      const life = [
        { k: 'ค่าใช้จ่ายรวมตลอดอายุ', v: baht(totalFuel + totalMaint) },
        kmpls.length ? { k: 'กม./ล. ดีสุด / แย่สุด', v: fmt(Math.max(...kmpls), 1) + ' / ' + fmt(Math.min(...kmpls), 1) } : null,
        usage ? { k: 'ใช้รถเฉลี่ย', v: fmt(usage.kmPerDay, 0) + ' กม./วัน · ~' + fmt(usage.kmPerDay * 365) + ' กม./ปี' } : null,
        { k: 'น้ำมันรวม', v: fmt(totalLiters, 1) + ' ลิตร' },
        topMonth ? { k: 'เดือนใช้จ่ายเยอะสุด', v: thMonthYear(topMonth + '-01') + ' · ' + baht(topVal) } : null,
      ].filter(Boolean);

      return (
        <div className="px-4 pt-safe">
          <Header title="สรุป" subtitle="ภาพรวมค่าใช้จ่าย" />

          <div className="grid grid-cols-2 gap-3 mb-3">
            <BigStat label="ค่าน้ำมันรวม" value={baht(totalFuel)} icon="⛽" accent="from-brand/20 to-brand/5 border-brand/25" />
            <BigStat label="ค่าบำรุงรวม" value={baht(totalMaint)} icon="🔧" accent="from-emerald-500/15 to-emerald-500/5 border-emerald-500/25" />
            <BigStat label="ต้นทุนต่อ กม." value={cpk ? baht(cpk) : '–'} icon="📈" accent="from-cyan-500/15 to-cyan-500/5 border-cyan-500/25" />
            <BigStat label="ระยะทางรวม" value={fmt(dist) + ' กม.'} icon="🛣️" accent="from-violet-500/15 to-violet-500/5 border-violet-500/25" />
          </div>

          {budget > 0 && (
            <Card className={'p-4 mb-3 ' + (monthSpend > budget ? 'ring-1 ring-rose-500/40' : '')}>
              <div className="flex items-center justify-between mb-2">
                <div className="font-bold">งบเดือนนี้ ({thMonthYear(curMonth + '-01')})</div>
                {monthSpend > budget && <span className="text-[11px] px-2 py-0.5 rounded-full bg-rose-500/15 text-rose-300 font-bold">เกินงบ</span>}
              </div>
              <div className="flex items-baseline justify-between">
                <span className={'text-2xl font-black num ' + (monthSpend > budget ? 'text-rose-400' : 'text-emerald-300')}>{baht(monthSpend)}</span>
                <span className="text-[13px] text-slate-500 num">/ {baht(budget)}</span>
              </div>
              <div className="mt-2 h-2.5 rounded-full bg-white/10 overflow-hidden">
                <div className={'h-full rounded-full ' + (monthSpend > budget ? 'bg-rose-500' : 'bg-gradient-to-r from-brand to-cyan-300')} style={{ width: Math.max(2, Math.min(100, budget ? (monthSpend / budget) * 100 : 0)) + '%' }}></div>
              </div>
            </Card>
          )}

          {cats.length > 0 && (
            <Card className="p-4 mb-3">
              <div className="font-bold mb-3">ค่าใช้จ่ายแยกหมวด</div>

    function TripCalc({ data, fuelStats }) {
      const [dist, setDist] = useState('');
      const avg = avgKmpl(fuelStats);
      const lastFuel = [...data.fuelLogs].sort((a, b) => (a.date < b.date ? 1 : -1))[0];
      const price = lastFuel && lastFuel.pricePerL > 0 ? lastFuel.pricePerL : null;
      const cpkFuel = useMemo(() => {
        const fuel = data.fuelLogs.reduce((s, f) => s + Number(f.totalCost || 0), 0);
        const odos = data.fuelLogs.map(f => f.odo).filter(x => x > 0);
        const range = odos.length ? (data.vehicle.currentOdo - Math.min(...odos)) : 0;
        return range > 0 ? fuel / range : null;
      }, [data]);
      const d = parseFloat(dist);
      const liters = (avg && d > 0) ? d / avg : null;
      const costByFill = (price && liters != null) ? liters * price : null;
      const costByAvg = (cpkFuel && d > 0) ? cpkFuel * d : null;

      return (
        <Card className="p-4">
          <div className="font-bold mb-1">🧮 คำนวณค่าน้ำมันทริป</div>
          <div className="text-[12px] text-slate-500 mb-3">ใส่ระยะทางที่จะไป ระบบประเมินค่าน้ำมันให้</div>
          <Field label="ระยะทาง (กม.)"><NumInput value={dist} onChange={setDist} placeholder="เช่น 250" /></Field>
          {!avg && <div className="text-[12px] text-amber-300/80 mt-2">ต้องมีข้อมูลเติมเต็มถัง 2 ครั้งก่อน เพื่อหาค่าเฉลี่ย</div>}
          {avg && d > 0 && (
            <div className="grid grid-cols-2 gap-3 mt-3">
              <div className="rounded-2xl bg-brand/10 border border-brand/20 p-3.5">
                <div className="text-[12px] text-slate-400">น้ำมันที่ใช้</div>
                <div className="text-2xl font-black num text-brand">{fmt(liters, 1)}<span className="text-sm text-slate-400 font-semibold"> ล.</span></div>
              </div>
              <div className="rounded-2xl bg-emerald-500/10 border border-emerald-500/20 p-3.5">
                <div className="text-[12px] text-slate-400">ค่าน้ำมันประมาณ</div>
                <div className="text-2xl font-black num text-emerald-300">{baht(costByFill != null ? costByFill : costByAvg)}</div>
              </div>
              <div className="col-span-2 text-[11px] text-slate-600">
                * อิงเฉลี่ย {fmt(avg, 1)} กม./ล.{price ? ' · ราคา ' + fmt(price, 2) + ' ฿/ล. (เติมล่าสุด)' : (cpkFuel ? ' · ต้นทุนน้ำมัน ' + fmt(cpkFuel, 2) + ' ฿/กม.' : '')}
              </div>
            </div>
          )}
        </Card>
      );
    }

    /* ---- Custom SVG charts (offline, no deps) ---- */
    function BarChart({ data }) {
      const W = 320, H = 200, padL = 34, padB = 26, padT = 10;
      const max = Math.max(1, ...data.flatMap(d => [d['น้ำมัน'], d['ซ่อมบำรุง']]));
      const niceMax = niceCeil(max);
      const plotW = W - padL - 8, plotH = H - padB - padT;
      const groupW = plotW / data.length;
      const barW = Math.min(18, groupW / 2.6);
      const ticks = 4;
      const y = v => padT + plotH - (v / niceMax) * plotH;
      return (
        <svg viewBox={'0 0 ' + W + ' ' + H} width="100%" height={H} style={{ overflow: 'visible' }}>
          {Array.from({ length: ticks + 1 }).map((_, i) => {
            const v = (niceMax / ticks) * i;
            return (
              <g key={i}>
                <line x1={padL} y1={y(v)} x2={W - 4} y2={y(v)} stroke="#ffffff12" strokeDasharray="3 3" />
                <text x={padL - 6} y={y(v) + 3} fontSize="9" fill="#64748b" textAnchor="end">{kFmt(v)}</text>
              </g>
            );
          })}
          {data.map((d, i) => {
            const cx = padL + groupW * i + groupW / 2;
            return (
              <g key={i}>
                <rect x={cx - barW - 1} y={y(d['น้ำมัน'])} width={barW} height={Math.max(0, padT + plotH - y(d['น้ำมัน']))} rx="3" fill="#38bdf8" />
                <rect x={cx + 1} y={y(d['ซ่อมบำรุง'])} width={barW} height={Math.max(0, padT + plotH - y(d['ซ่อมบำรุง']))} rx="3" fill="#34d399" />
                <text x={cx} y={H - 8} fontSize="9.5" fill="#94a3b8" textAnchor="middle">{d.name}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    function LineChart({ data, color = '#38bdf8' }) {
      const W = 320, H = 190, padL = 34, padB = 24, padT = 12, padR = 8;
      const gid = 'lg' + color.replace('#', '');
      const vals = data.map(d => d.value);
      const min = Math.min(...vals), max = Math.max(...vals);
      const lo = Math.floor(min - 2), hi = Math.ceil(max + 2), span = Math.max(1, hi - lo);
      const plotW = W - padL - padR, plotH = H - padB - padT;
      const x = i => padL + (data.length === 1 ? plotW / 2 : (plotW / (data.length - 1)) * i);
      const y = v => padT + plotH - ((v - lo) / span) * plotH;
      const pts = data.map((d, i) => x(i) + ',' + y(d.value));
      const area = 'M' + x(0) + ',' + (padT + plotH) + ' L' + pts.join(' L') + ' L' + x(data.length - 1) + ',' + (padT + plotH) + ' Z';
      const ticks = 4;
      return (
        <svg viewBox={'0 0 ' + W + ' ' + H} width="100%" height={H} style={{ overflow: 'visible' }}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {Array.from({ length: ticks + 1 }).map((_, i) => {
            const v = lo + (span / ticks) * i;
            return (
              <g key={i}>
                <line x1={padL} y1={y(v)} x2={W - padR} y2={y(v)} stroke="#ffffff12" strokeDasharray="3 3" />
                <text x={padL - 6} y={y(v) + 3} fontSize="9" fill="#64748b" textAnchor="end">{v.toFixed(0)}</text>
              </g>
            );
          })}
          <path d={area} fill={'url(#' + gid + ')'} />
          <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {data.map((d, i) => (
            <g key={i}>
              <circle cx={x(i)} cy={y(d.value)} r="3.5" fill={color} stroke="#0a0b0f" strokeWidth="1.5" />
              {(i === 0 || i === data.length - 1 || data.length <= 6) && <text x={x(i)} y={H - 6} fontSize="9" fill="#94a3b8" textAnchor="middle">{d.name}</text>}
            </g>
          ))}
        </svg>
      );
    }

    function niceCeil(v) {
      if (v <= 0) return 1;
      const mag = Math.pow(10, Math.floor(Math.log10(v)));
      const n = v / mag;
      const step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
      return step * mag;
    }
    function kFmt(v) { return v >= 1000 ? (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1) + 'k' : String(Math.round(v)); }

    function BigStat({ label, value, icon, accent }) {
      return (
        <div className={'rounded-3xl p-4 bg-gradient-to-br border ' + accent}>

          <div className="text-[12px] text-slate-400 mt-2">{label}</div>
          <div className="text-xl font-black num mt-0.5">{value}</div>
        </div>
      );
    }
    function ChartEmpty({ msg }) {
      return <div className="h-[180px] flex flex-col items-center justify-center text-slate-600"><div className="text-3xl mb-2">📊</div><div className="text-sm">{msg || 'ยังไม่มีข้อมูลเพียงพอ'}</div></div>;

            <div className="text-[12px] text-slate-500 px-1 mt-2.5">สร้างไฟล์ปฏิทินสำหรับรายการที่มีวันครบกำหนด (พ.ร.บ. ภาษี ประกัน น้ำมันเบรค ฯลฯ) พร้อมตั้งเตือนล่วงหน้า {data.settings.warnAheadDays} วัน — เปิดไฟล์แล้วกด "เพิ่ม" เข้าปฏิทิน</div>
          </Card>

          {/* Data management */}
          <SectionLabel>สำรองข้อมูล</SectionLabel>
          <Card className="p-4 space-y-2.5 mb-5">
            <div className="grid grid-cols-2 gap-3">
              <GhostBtn onClick={exportData} className="text-center">⬇️ Export JSON</GhostBtn>
              <GhostBtn onClick={() => fileRef.current.click()} className="text-center">⬆️ Import JSON</GhostBtn>
            </div>
            <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={importJSON} />
            <div className={'text-[12px] px-1 ' + (bDays != null && bDays <= data.settings.backupIntervalDays ? 'text-emerald-300/80' : 'text-amber-300/80')}>
              {bDays == null ? '⚠️ ยังไม่เคยสำรองข้อมูล' : '💾 สำรองล่าสุด: ' + thDate(data.settings.lastBackup) + ' (' + bDays + ' วันก่อน)'}
            </div>
            <Field label="เตือนสำรองข้อมูลทุก (วัน)"><NumInput value={String(data.settings.backupIntervalDays)} onChange={v => update(d => d.settings.backupIntervalDays = parseFloat(v) || 14)} /></Field>
            <div className="text-[12px] text-slate-500 px-1">💡 แนะนำ Export สำรองเป็นประจำ (Safari อาจล้างข้อมูลที่ไม่ได้ใช้นาน)</div>
            <button onClick={clearAll} className="press w-full py-3 rounded-2xl bg-rose-500/10 border border-rose-500/25 text-rose-300 font-semibold text-sm mt-1">🗑️ ล้างข้อมูลทั้งหมด</button>
          </Card>

          {/* GitHub Gist sync */}
          <SectionLabel>ซิงค์ขึ้น GitHub (Gist)</SectionLabel>
          <SyncCard ctx={ctx} />

          <div className="text-center text-[12px] text-slate-600 pb-4">XMAX Logbook · v1.6 · offline-first<br />ข้อมูลอ้างอิงจากคู่มือ B5X-F8199-U1 · เก็บในเครื่องนี้เท่านั้น</div>

          <TireSheet open={tireOpen} onClose={() => setTireOpen(false)} ctx={ctx} />
        </div>
      );
    }

    function TireSheet({ open, onClose, ctx }) {
      const { data, update, showToast } = ctx;
      const [t, setT] = useState({});
      useEffect(() => { if (open) setT({ date: todayStr(), odo: String(data.vehicle.currentOdo || ''), front: '29', rear: '33', note: '' }); }, [open]);
      const set = (k, v) => setT(p => ({ ...p, [k]: v }));
      const save = () => {
        update(d => { (d.tireLogs = d.tireLogs || []).push({ id: uuid(), date: t.date, odo: parseFloat(t.odo) || 0, front: parseFloat(t.front) || 0, rear: parseFloat(t.rear) || 0, note: t.note || '' }); });
        showToast('บันทึกค่าลมยางแล้ว'); onClose();
      };
      return (
        <Sheet open={open} onClose={onClose} title="บันทึกค่าลมยาง">
          <div className="space-y-4">
            <div className="text-[12px] text-slate-400 px-1">เป้าหมายตามคู่มือ: หน้า 29 · หลัง 33 psi (วัดขณะยางเย็น)</div>
            <Field label="วันที่"><DateInput value={t.date} onChange={v => set('date', v)} /></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="ลมยางหน้า (psi)"><NumInput value={t.front} onChange={v => set('front', v)} /></Field>
              <Field label="ลมยางหลัง (psi)"><NumInput value={t.rear} onChange={v => set('rear', v)} /></Field>
            </div>
            <Field label="หมายเหตุ"><TextInput value={t.note} onChange={v => set('note', v)} placeholder="เช่น เติมที่ปั๊ม" /></Field>
            <PrimaryBtn onClick={save}>บันทึก</PrimaryBtn>
          </div>
        </Sheet>
      );
    }

    function SyncCard({ ctx }) {
      const { data, update, showToast, sync, setSyncCfg, connected, pushNow, pullNow } = ctx;
      const [tokenInput, setTokenInput] = useState('');
      const [gistInput, setGistInput] = useState('');
      const [busy, setBusy] = useState('');

      const connectNew = async () => {
        const tk = tokenInput.trim(); if (!tk) { alert('กรุณาใส่ token ก่อน'); return; }
        setBusy('connect');
        try { const id = await gistCreate(tk, data); setSyncCfg({ token: tk, gistId: id, lastSync: new Date().toISOString() }); setTokenInput(''); showToast('สร้าง Gist & ดันข้อมูลขึ้นแล้ว'); }
        catch (e) { alert(e.message); } finally { setBusy(''); }
      };
      const connectExisting = async () => {
        const tk = tokenInput.trim(), id = gistInput.trim();
        if (!tk || !id) { alert('ใส่ token และ Gist ID'); return; }
        setBusy('connect');
        try { await gistPull(tk, id); setSyncCfg({ token: tk, gistId: id, lastSync: '' }); setTokenInput(''); setGistInput(''); showToast('เชื่อมต่อสำเร็จ — กด Pull เพื่อดึงข้อมูล'); }
        catch (e) { alert(e.message); } finally { setBusy(''); }
      };
      const push = async () => { setBusy('push'); await pushNow(false); setBusy(''); };
      const pull = async () => { if (!confirm('ดึงข้อมูลจาก GitHub มาทับข้อมูลในเครื่องนี้?')) return; setBusy('pull'); await pullNow(); setBusy(''); };
      const disconnect = () => { if (confirm('ตัดการเชื่อมต่อ? (ข้อมูลใน Gist ไม่ถูกลบ — แค่ลืม token/gist ในเครื่องนี้)')) setSyncCfg({ token: '', gistId: '', lastSync: '' }); };

      if (!connected) return (
        <Card className="p-4 space-y-3 mb-5">
          <div className="text-[12px] text-slate-400 leading-relaxed">เก็บข้อมูลขึ้น GitHub Gist (ลับ) — ไม่ต้อง Export ไฟล์เอง · เปิดเครื่องอื่นก็ Pull มาใช้ต่อได้</div>
          <Field label="GitHub Token (เก็บในเครื่องนี้เท่านั้น)" hint="github.com/settings/tokens → Tokens (classic) → ติ๊กสิทธิ์ gist อย่างเดียว → ตั้งวันหมดอายุ">
            <input type="password" autoComplete="off" value={tokenInput} onChange={e => setTokenInput(e.target.value)} placeholder="ghp_..." className={inputCls + ' text-left'} />
          </Field>
          <PrimaryBtn onClick={connectNew} disabled={!!busy}>{busy === 'connect' ? 'กำลังทำงาน...' : '✨ สร้าง Gist ใหม่ & ดันข้อมูลขึ้น'}</PrimaryBtn>
          <div className="text-center text-[12px] text-slate-600">— หรือเชื่อมกับ Gist ที่มีอยู่ —</div>
          <Field label="Gist ID (ถ้ามีอยู่แล้ว)"><input type="text" autoComplete="off" value={gistInput} onChange={e => setGistInput(e.target.value)} placeholder="a1b2c3d4..." className={inputCls + ' text-left'} /></Field>
          <GhostBtn onClick={connectExisting} className="w-full text-center">🔗 เชื่อมกับ Gist เดิม</GhostBtn>
        </Card>
      );
      return (
        <Card className="p-4 space-y-2.5 mb-5">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2"><span className="text-lg">☁️</span><span className="font-bold">เชื่อมต่อแล้ว</span></div>
            <a href={'https://gist.github.com/' + sync.gistId} target="_blank" rel="noopener noreferrer" className="text-[12px] text-brand font-semibold">เปิด Gist ↗</a>
          </div>
          <div className="text-[12px] text-slate-500 num">Gist: {sync.gistId.slice(0, 10)}… · {sync.lastSync ? 'ซิงค์ล่าสุด ' + thDate(sync.lastSync.slice(0, 10)) : 'ยังไม่เคยซิงค์'}</div>
          <div className="grid grid-cols-2 gap-3 pt-1">
            <PrimaryBtn onClick={push} disabled={!!busy} className="!py-3.5">{busy === 'push' ? '...' : '⬆️ Push ขึ้น'}</PrimaryBtn>
            <GhostBtn onClick={pull} className="text-center">{busy === 'pull' ? '...' : '⬇️ Pull ลง'}</GhostBtn>
          </div>
          <div className="flex items-center justify-between pt-1">
            <div>
              <div className="font-semibold text-[15px]">ซิงค์อัตโนมัติ</div>
              <div className="text-[12px] text-slate-500">ดันขึ้นเองหลังแก้ข้อมูล (~3 วิ)</div>
            </div>
            <button onClick={() => update(d => d.settings.autoSync = !d.settings.autoSync)} className={'press w-12 h-7 rounded-full transition relative flex-shrink-0 ' + (data.settings.autoSync ? 'bg-brand' : 'bg-white/15')}>
              <div className={'absolute top-0.5 w-6 h-6 rounded-full bg-white transition-all ' + (data.settings.autoSync ? 'left-[1.4rem]' : 'left-0.5')}></div>
            </button>
          </div>
          <button onClick={disconnect} className="press w-full py-2.5 rounded-2xl bg-white/[0.06] border border-white/10 text-slate-400 text-[13px] font-semibold">ตัดการเชื่อมต่อ</button>
        </Card>
      );
    }

    function RefRow({ k, v, last }) {
      return <div className={'flex justify-between gap-4 py-2 ' + (last ? '' : 'border-b border-white/[0.06]')}><span className="text-[13px] text-slate-400 flex-shrink-0">{k}</span><span className="text-[13px] text-slate-200 text-right font-medium">{v}</span></div>;
    }
    function SectionLabel({ children }) {
      return <div className="text-[12px] font-bold text-slate-500 uppercase tracking-wider mb-2 px-1">{children}</div>;
    }
    function Header({ title, subtitle }) {
      return (
        <div className="pt-3 pb-4 sticky top-0 z-20">
          <div className="text-[13px] text-slate-400 font-medium">{subtitle}</div>
          <div className="text-3xl font-extrabold tracking-tight">{title}</div>
        </div>
      );
    }
    function EmptyState({ icon, title, sub }) {
      return (
        <Card className="p-8 text-center">
          <div className="text-4xl mb-2">{icon}</div>
          <div className="font-bold text-slate-300">{title}</div>
          <div className="text-[13px] text-slate-500 mt-1">{sub}</div>
        </Card>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } catch (e) {
      window.__xmaxErr && window.__xmaxErr('Render: ' + (e.message || e));
    }
  </script>

  <script>
    // ---- PWA: inline manifest via blob ----
    (function () {
      try {
        const manifest = {
          name: 'XMAX Logbook', short_name: 'XMAX', display: 'standalone', orientation: 'portrait',
          background_color: '#070809', theme_color: '#0a0b0f', start_url: '.',
          icons: [{
            src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230a0b0f'/%3E%3Ctext x='50%25' y='54%25' font-size='240' font-family='Arial' font-weight='900' fill='%2338bdf8' text-anchor='middle' dominant-baseline='middle'%3EX%3C/text%3E%3C/svg%3E",
            sizes: '512x512', type: 'image/svg+xml', purpose: 'any'
          }],
          shortcuts: [
            { name: 'เติมน้ำมัน', short_name: 'เติมน้ำมัน', url: './?action=fuel' },
            { name: 'บันทึกซ่อม', short_name: 'ซ่อมบำรุง', url: './?action=maint' },
            { name: 'อัปเดตเลขไมล์', short_name: 'เลขไมล์', url: './?action=odo' },
          ],
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
      } catch (e) {}
    })();

    // ---- Service worker (offline) via blob ----
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'xmax-v1';
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            caches.open(CACHE).then(cache =>
              cache.match(e.request).then(cached => {
                const net = fetch(e.request).then(resp => {
                  if (resp && resp.status === 200) cache.put(e.request, resp.clone());
                  return resp;
                }).catch(() => cached);
                return cached || net;
              })
            )
          );
        });
      `;
      try {
        const url = URL.createObjectURL(new Blob([swCode], { type: 'text/javascript' }));
        navigator.serviceWorker.register(url).catch(() => {});
      } catch (e) {}
    }
  </script>
</body>
</html>
